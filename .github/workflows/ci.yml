name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Appointment-booking app/client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Appointment-booking app/client
      - name: Run ESLint
        run: npm run lint
        working-directory: Appointment-booking app/client

  server-unit-tests:
    name: Server unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appointmentbook
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: Appointment-booking app/server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Appointment-booking app/server
      - name: Run server unit tests
        run: npm test -- --reporter=verbose
        working-directory: Appointment-booking app/server

  client-unit-tests:
    name: Client unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: Appointment-booking app/client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Appointment-booking app/client
      - name: Run ESLint
        run: npm run lint
        working-directory: Appointment-booking app/client
      - name: Run client unit tests
        run: npm test -- --reporter=verbose
        working-directory: Appointment-booking app/client

  e2e-tests:
    name: E2E tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        node-version: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appointmentbook
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: Appointment-booking app/client/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: Appointment-booking app/server
      - name: Install client dependencies
        run: npm ci
        working-directory: Appointment-booking app/client
      - name: Run database migrations
        run: node migrate.js
        working-directory: Appointment-booking app/server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/appointmentbook
          DISABLE_RATE_LIMIT: 'true'
          LOG_LEVEL: silent
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: Appointment-booking app/client
      - name: Run E2E tests
        continue-on-error: true
        run: npm run e2e -- --reporter=list
        working-directory: Appointment-booking app/client
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/appointmentbook
          DISABLE_RATE_LIMIT: 'true'
          DISABLE_SCHEDULER: 'true'
          LOG_LEVEL: silent
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-${{ matrix.node-version }}
          path: |
            Appointment-booking app/client/test-results/
            Appointment-booking app/client/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
